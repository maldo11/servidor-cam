<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería ESP32-CAM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #eee; font-family: Arial, sans-serif; padding: 20px; }
    h1 { text-align: center; margin-bottom: 30px; color: #4fc3f7; font-size: 1.8rem; }
    .galeria { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card { background: #1e1e1e; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
    .card img { width: 100%; height: 200px; object-fit: cover; display: block; cursor: pointer; transition: opacity 0.2s; }
    .card img:hover { opacity: 0.85; }
    .info { padding: 12px; }
    .qr { font-size: 0.85rem; color: #4fc3f7; word-break: break-all; margin-bottom: 6px; }
    .fecha { font-size: 0.75rem; color: #888; }
    .badge { display: inline-block; background: #263238; border: 1px solid #4fc3f7; border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; margin-bottom: 6px; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; align-items:center; justify-content:center; }
    .modal.active { display:flex; }
    .modal img { max-width:90%; max-height:90vh; border-radius:8px; }
    .modal-close { position:absolute; top:20px; right:30px; font-size:2rem; cursor:pointer; color:#fff; }
    .empty { text-align:center; color:#555; margin-top:80px; font-size:1.2rem; }
  </style>
</head>
<body>
  <h1>📷 Galería ESP32-CAM</h1>
  {% if registros %}
  <div class="galeria">
    {% for r in registros %}
    <div class="card">
      <img src="/fotos/{{ r.archivo }}" alt="foto" onclick="abrirModal(this.src)">
      <div class="info">
        <div class="badge">QR</div>
        <div class="qr">{{ r.codigo_qr }}</div>
        <div class="fecha">🕐 {{ r.fecha }}</div>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="empty">Aún no hay fotos recibidas</div>
  {% endif %}
  <div class="modal" id="modal" onclick="cerrarModal()">
    <span class="modal-close">✕</span>
    <img id="modal-img" src="" alt="">
  </div>
  <script>
    function abrirModal(src) {
      document.getElementById('modal-img').src = src;
      document.getElementById('modal').classList.add('active');
    }
    function cerrarModal() {
      document.getElementById('modal').classList.remove('active');
    }
    setTimeout(() => location.reload(), 30000);
  </script>
</body>
</html>
